services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: drive_logger
      MYSQL_ROOT_PASSWORD: shikha@26
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: ./api
    environment:
      DATABASE_URL: mysql://root:shikha%4026@db:3306/drive_logger
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  mysqldata:
